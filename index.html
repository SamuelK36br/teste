<!DOCTYPE html>

<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel='stylesheet' href='style.css'>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <title>Calculadora Liedshow</title>
</head>
<body>
  <header>
  <h1>
    Bem vindo(a) a Calculadora do Liedshow!!!
  </h1>
  
  <h2>
    Você deseja fazer qual operação matemática?
  </h2>
  </header>
    
  <main>
  <fieldset id='calculadora'>
    <legend>
      Calculadora Liedshow!
    </legend>
    
    <label for='valor1' id='labelVal1'>
      Valor número 1:
    </label>
    <input id='valor1' type='number'>
    
    <br>
    
    <label for='valor2' id='labelVal2'>
      Valor número 2:
    </label>
    <input id='valor2' type='number'>
    
    <br><br>
    
    <select>
      <option disabled selected>Escolha sua operação:</option>
      <option>Adição +</option>
      <option>Subtração -</option>
      <option>Multiplicação ×</option>
      <option>Divisão ÷</option>
    </select>
    
    <br><br>
      
    <button id='calcular'>
      Realizar Cálculo
    </button>
    
    <br><br>
    
    <span id='resultado'></span>
  </fieldset>
  </main>
  
  <footer>
    <fieldset id='creditos'>
      <legend id='creditosLegend'>
        Creditos:
      </legend>
      <span>
        <strong>Criado por:</strong>
        SamuelK36br
      </span>
      <br>
      <span>
        <strong>Idealizado por:</strong>
        Liedshow
      </span>
    </fieldset>
  </footer>
  <script src='script.js'></script>
</body>
</html>
